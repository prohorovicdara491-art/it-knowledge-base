{% extends 'myapp/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <i class="fas fa-exclamation-triangle fa-4x mb-3" style="color: #f59e0b;"></i>
            <h3>Удалить заметку?</h3>
            <p class="text-muted">"{{ note.title }}" будет удалена безвозвратно.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="submit" class="btn btn-primary" style="background: linear-gradient(135deg, #dc2626, #b91c1c); border: none;">
                        <i class="fas fa-trash"></i> Да, удалить
                    </button>
                    <a href="{% url 'note_list' %}" class="btn-glass">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
